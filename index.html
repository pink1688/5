<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索世界 | 芊芊旅遊誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.org/photo-1469854523086-cc02fe5d8df9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-2xl font-bold tracking-tighter text-blue-600">芊芊旅遊 <span class="text-stone-400 font-light text-sm">TRAVEL</span></div>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="#home" class="hover:text-blue-500 transition">首頁</a>
                <a href="#destinations" class="hover:text-blue-500 transition">熱門目的地</a>
                <a href="#services" class="hover:text-blue-500 transition">旅行服務</a>
                <a href="#contact" class="bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700 transition">立即諮詢</a>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-bg h-screen flex items-center justify-center text-center text-white px-6">
        <div>
            <h1 class="text-5xl md:text-7xl font-bold mb-6 drop-shadow-lg">下一站，去哪裡？</h1>
            <p class="text-xl md:text-2xl font-light mb-10 max-w-2xl mx-auto">跳脫日常的框架，讓我們一起探索那些被世界遺忘的角落。</p>
            <a href="#destinations" class="bg-white text-blue-600 px-8 py-4 rounded-full font-bold text-lg hover:bg-blue-50 transition shadow-xl">
                開始探索 <i class="fas fa-compass ml-2"></i>
            </a>
        </div>
    </section>

    <section id="destinations" class="py-24 max-w-7xl mx-auto px-6">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-bold mb-4 italic">精選目的地</h2>
            <div class="w-20 h-1 bg-blue-500 mx-auto"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="group overflow-hidden rounded-2xl shadow-lg bg-white">
                <div class="h-64 overflow-hidden">
                    <img src="https://images.unsplash.org/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="風景" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">高山密境</h3>
                    <p class="text-stone-500 text-sm mb-4">感受呼吸間的清新，與大自然進行一場無聲的對話。</p>
                    <span class="text-blue-600 font-bold">$12,800 起</span>
                </div>
            </div>

            <div class="group overflow-hidden rounded-2xl shadow-lg bg-white">
                <div class="h-64 overflow-hidden">
                    <img src="https://images.unsplash.org/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" alt="海灘" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">純淨海灘</h3>
                    <p class="text-stone-500 text-sm mb-4">細軟白沙與湛藍海水，這裡是夏日唯一的解藥。</p>
                    <span class="text-blue-600 font-bold">$15,500 起</span>
                </div>
            </div>

            <div class="group overflow-hidden rounded-2xl shadow-lg bg-white">
                <div class="h-64 overflow-hidden">
                    <img src="https://images.unsplash.org/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80" alt="京都" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">古都散策</h3>
                    <p class="text-stone-500 text-sm mb-4">漫步在歷史交織的街道，體驗文化最深層的靈魂。</p>
                    <span class="text-blue-600 font-bold">$18,900 起</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-stone-900 text-stone-400 py-12 px-6 text-center">
        <div class="mb-6">
            <i class="fab fa-instagram mx-4 text-2xl hover:text-white cursor-pointer"></i>
            <i class="fab fa-facebook mx-4 text-2xl hover:text-white cursor-pointer"></i>
            <i class="fab fa-youtube mx-4 text-2xl hover:text-white cursor-pointer"></i>
        </div>
        <p class="text-xs tracking-widest">© 2026 芊芊旅遊雜誌. All Rights Reserved.</p>
    </footer>

</body>
</html>
